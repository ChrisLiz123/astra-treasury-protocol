name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure CI-only Hardhat variables
        run: |
          echo "BASE_SEPOLIA_RPC_URL=http://127.0.0.1:8545" >> "$GITHUB_ENV"
          echo "BASE_SEPOLIA_PRIVATE_KEY=0x$(printf '1%.0s' {1..64})" >> "$GITHUB_ENV"
          echo "ETHERSCAN_API_KEY=ci-not-used" >> "$GITHUB_ENV"

      - name: Show tool versions
        run: |
          node -v
          npm -v
          npx hardhat --version

      - name: Install dependencies
        run: npm ci

      - name: Local Solidity compile
        run: npm run compile:local

      - name: Hardhat compile
        run: npx hardhat compile --show-stack-traces

      - name: Release safety check
        run: npm run release:check

      - name: Local stateful audit
        run: npm run audit:stateful

      - name: Local randomized stateful fuzz
        run: npm run audit:local-fuzz
